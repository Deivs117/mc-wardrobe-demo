<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Wardrobe | Vestidor Virtual Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;800&family=Barlow+Condensed:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/wardrobe.css">
</head>
<body>

  <main class="wardrobe-container">
    
    <section class="canvas-section">
      <div class="cosmos-bg"></div> <div class="avatar-canvas" id="avatarCanvas">
        <img id="layer-body" src="" alt="Cuerpo Base" class="canvas-layer layer-base">
        
        <img id="layer-superior" src="" alt="Prenda Superior" class="canvas-layer layer-top">
        
        <img id="layer-inferior" src="" alt="Prenda Inferior" class="canvas-layer layer-bottom">
        
        <img id="layer-calzado" src="" alt="Calzado" class="canvas-layer layer-shoes">
      </div>

      <button class="btn-checkout" id="btnCheckout">
        Pedir este Outfit MC 🏆
      </button>
    </section>

    <section class="controls-section">
      <header class="panel-header">
        <h1 class="display-title">VESTIDOR <span class="highlight">VIRTUAL</span></h1>
        <p class="panel-subtitle">Arma tu kit runner de alto rendimiento</p>
        
        <div class="gender-selector" id="genderSelector"></div>
      </header>

      <nav class="category-tabs" id="categoryTabs"></nav>

      <div class="wardrobe-grid" id="wardrobeGrid"></div>
    </section>

  </main>

  <script src="js/wardrobe-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
